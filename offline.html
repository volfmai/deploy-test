
<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ინტერნეტთან კავშირი ვერ მოხერხდა | Aura.Ge</title>
<style>
  :root {
    --bg-color: #f5f5f5;
    --text-color: #333333;
    --emerald: #00e6cf;
    --svg-black: #000000;
    --border: #dcdcdc;
    --accent-light: #f2fdfc;
    color-scheme: light dark;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-color: #121212;
      --text-color: #e0e0e0;
      --svg-black: #ffffff;
      --border: #3a3a3a;
      --accent-light: #152b29;
    }
  }
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, system-ui, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    -webkit-font-smoothing: antialiased;
  }
  .offline-box {
    text-align: center;
    padding: 2rem;
    max-width: 420px;
    width: 90%;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.8s forwards 0.2s;
  }
  @keyframes fadeInUp {
    to { opacity: 1; transform: translateY(0); }
  }
  .icon-wrapper {
    margin-bottom: 2.5rem;
    display: inline-block;
    animation: floatGlow 5s ease-in-out infinite;
  }
  @keyframes floatGlow {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
  svg {
    width: 100px;
    height: 100px;
  }
  .svg-line { fill: var(--emerald) !important; }
  .svg-black { fill: var(--svg-black) !important; }
  h1 {
    font-size: 1.4rem;
    margin-bottom: 2rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    line-height: 1.3;
  }
  .retry-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 42px;
    min-width: 160px;
    padding: 0 35px;
    margin-top: 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--emerald);
    background: none;
    font-weight: 600;
    font-size: 1rem;
    line-height: 1.4;
    letter-spacing: 0.8px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, transform 0.1s;
    font-family: inherit;
    -webkit-tap-highlight-color: rgba(0,0,0,0);
    user-select: none;
    touch-action: manipulation;
  }
  .retry-btn span {
    transform: translateY(-2px);
    display: block;
  }
  .retry-btn:active {
    background: var(--accent-light) !important;
    color: var(--text-color) !important;
    border-color: var(--emerald) !important;
    transform: scale(0.96);
    transition: none !important;
  }
.retry-btn:focus-visible {
    outline: 2px solid var(--emerald);
    outline-offset: 2px;
  }
  @media (hover: hover) {
    .retry-btn:hover {
      background: var(--accent-light);
      border-color: var(--emerald);
      color: var(--text-color);
    }
  }
  @media (max-width: 480px) {
    h1 {
      font-size: 1.55rem;
      margin-bottom: 2.5rem;
    }
    .retry-btn {
      height: 50px;
      min-width: 190px;
      font-size: 1.15rem;
    }
    .retry-btn span {
      transform: translateY(-2px);
    }
  }
</style>
</head>
<body ontouchstart="">
<div class="offline-box">
  <div class="icon-wrapper">
    <svg version="1.0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512.000000 512.000000">

        <path class="svg-black" d="M1583 3126 c-195 -98 -361 -212 -511 -351 -87 -81 -102 -107 -102 -177 0 -98 61 -158 160 -158 65 0 75 6 201 118 118 105 263 203 410 277 63 31 122 64 133 73 31 29 46 69 46 125 0 94 -65 157 -162 157 -37 0 -72 -13 -175 -64z"/>
        <path class="svg-black" d="M2090 2347 c-134 -54 -247 -122 -350 -209 -101 -87 -120 -116 -120 -188 0 -101 60 -160 161 -160 62 0 62 0 198 111 81 65 201 132 297 163 29 10 65 31 84 51 30 31 34 43 38 98 4 77 -18 122 -74 154 -59 34 -112 30 -234 -20z"/>

      </g>
    </svg>
  </div>
  <h1>ინტერნეტთან კავშირი ვერ მოხერხდა</h1>
  <button id="retryBtn" class="retry-btn" aria-label="გვერდის გადატვირთვა">
    <span>გადატვირთვა</span>
  </button>
</div>
<script>
  const btn = document.getElementById('retryBtn');
 
  btn.addEventListener('click', function(e) {
    e.preventDefault();
    // აიფონზე დაყოვნება აჩვენებს ეფექტს გადატვირთვამდე
    setTimeout(() => {
      window.location.reload();
    }, 150);
  });
  window.addEventListener('online', () => window.location.reload());
</script>
</body>
</html>
